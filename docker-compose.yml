services:
  kanbanana:
    build: .
    image: kanbanana:latest
    container_name: kanbanana
    restart: unless-stopped
    ports:
      - "2233:2233"
    environment:
      # 路径相对 prisma/schema.prisma 解析 → 实际落在 /app/data/kanbanana.db
      # 注意：如果是从 0.1.x（stack-board）升级，entrypoint 会自动迁移旧 db 文件
      DATABASE_URL: "file:/app/data/kanbanana.db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-please-change-me-to-a-random-32-char-secret}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:2233}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      RUN_SEED: "${RUN_SEED:-true}"
    volumes:
      - ./data:/app/data

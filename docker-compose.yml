services:
  stack-board:
    build: .
    image: stack-board:latest
    container_name: stack-board
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 路径相对 prisma/schema.prisma 解析 → 实际落在 /app/data/stack-board.db
      DATABASE_URL: "file:/app/data/stack-board.db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-please-change-me-to-a-random-32-char-secret}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      RUN_SEED: "${RUN_SEED:-true}"
    volumes:
      - ./data:/app/data
